name: Bench (selection criteria)

# Portable estimator-selection bench-off: LOO vs EBIC vs k-fold.
#
# This runs the scripts/bench_selection.py sweep in ONE fixed, reproducible
# environment (a GitHub-hosted ubuntu-latest runner: same CPU class + RAM every
# time) instead of on whatever machine an agent happens to live on. Any device
# — laptop, phone, a mesh node, this box — kicks it the same way and reads the
# same results, so the wall-clock numbers are comparable across runs.
#
# Kick it from anywhere — no `gh` CLI needed:
#   - Any box with git+SSH:  git tag bench-$(date +%s) && git push origin --tags
#   - GitHub UI:             Actions -> "Bench (selection criteria)" -> Run workflow
#   - CLI (if gh present):   gh workflow run bench.yml -f reps=12
#
# Results land in THREE places, all readable from any device:
#   - the `bench-results` branch (git fetch origin bench-results) — no gh/browser
#   - the run's Summary page (GITHUB_STEP_SUMMARY, rendered inline)
#   - a downloadable "bench-results" artifact (bench_results.txt)

on:
  # Two portable, device-independent triggers — neither needs the `gh` CLI:
  #
  #   1. workflow_dispatch — kick from the GitHub UI (or `gh` if you have it).
  #   2. push of a `bench-*` tag — kick from ANY box with git+SSH:
  #        git tag bench-$(date +%s) && git push origin --tags
  #      The bench is expensive (LOO does n refits/candidate at genomics scale),
  #      so a dedicated tag is the deliberate "run it now" signal — it never
  #      fires on ordinary code pushes.
  workflow_dispatch:
    inputs:
      reps:
        description: "Replicates for the genomics-scale regime C (higher = tighter numbers, slower)"
        required: false
        default: "12"
  push:
    tags:
      - "bench-*"

# The job commits its results back to the `bench-results` branch so any device
# with git+SSH can `git fetch origin bench-results` and read the numbers — no
# `gh`, no browser, no Actions-artifact download required.
permissions:
  contents: write

concurrency:
  group: bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: selection bench-off
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        id: python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip numpy

      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.deps
          key: deps-${{ runner.os }}-${{ hashFiles('cmake/Dependencies.cmake') }}

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DADGENCOV_BUILD_CLI=OFF
          -DADGENCOV_BUILD_TESTS=OFF
          -DADGENCOV_BUILD_PYTHON=ON
          -DPython_EXECUTABLE="${{ steps.python.outputs.python-path }}"
          -DFETCHCONTENT_BASE_DIR="${{ github.workspace }}/.deps"

      - name: Build python module
        run: cmake --build build --config Release --parallel

      - name: Locate built module
        id: mod
        shell: bash
        run: |
          # The pybind11 target lands under build/; expose its dir on PYTHONPATH
          # so `import adgencov` resolves the freshly-built _core.
          modpath="$(dirname "$(find build -name '_core*.so' -print -quit)")"
          echo "Found _core at: $modpath"
          echo "pythonpath=$modpath:$PWD/python" >> "$GITHUB_OUTPUT"

      - name: Run selection bench-off
        env:
          PYTHONPATH: ${{ steps.mod.outputs.pythonpath }}
          # inputs.reps is empty on a tag-push trigger — fall back to 12 so the
          # bench runs identically no matter which trigger fired it.
          BENCH_REPS_C: ${{ github.event.inputs.reps || '12' }}
        shell: bash
        run: |
          set -o pipefail
          python scripts/bench_selection.py 2>&1 | tee bench_results.txt

      - name: Publish results to run summary
        if: always()
        shell: bash
        run: |
          {
            echo "## ADGENCOV selection bench-off"
            echo ""
            echo "Runner: \`ubuntu-latest\` · commit \`${GITHUB_SHA:0:8}\` · regime-C reps=\`${{ github.event.inputs.reps }}\`"
            echo ""
            echo '```'
            cat bench_results.txt 2>/dev/null || echo "(no output captured — build or run failed; see the job log)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench_results.txt
          if-no-files-found: warn

      - name: Commit results back to bench-results branch
        if: always()
        shell: bash
        env:
          GH_TOKEN_UNUSED: "no gh here — plain git over the runner's checkout token"
        run: |
          # Publish results to a dedicated orphan-style branch so ANY device with
          # git+SSH can read them: `git fetch origin bench-results` then open the
          # file. No gh CLI, no browser, no artifact download.
          set -euo pipefail

          stamp="$(date -u +%Y%m%dT%H%M%SZ)"
          sha="${GITHUB_SHA:0:8}"
          outfile="results/bench-${stamp}-${sha}.txt"

          git config user.name  "adgencov-bench-bot"
          git config user.email "bench-bot@users.noreply.github.com"

          # Work in a fresh worktree on the results branch so we don't disturb the
          # build tree. Create the branch if it doesn't exist yet.
          tmp="$(mktemp -d)"
          if git ls-remote --exit-code --heads origin bench-results >/dev/null 2>&1; then
            git fetch origin bench-results
            git worktree add "$tmp" origin/bench-results
            git -C "$tmp" checkout -B bench-results
          else
            git worktree add --detach "$tmp"
            git -C "$tmp" checkout --orphan bench-results
            git -C "$tmp" rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p "$tmp/results"
          cp bench_results.txt "$tmp/$outfile" 2>/dev/null || \
            echo "(no output captured — build or run failed; see the job log)" > "$tmp/$outfile"
          cp "$tmp/$outfile" "$tmp/results/latest.txt"

          {
            echo "# ADGENCOV selection bench-off — results index"
            echo ""
            echo "Latest: \`results/latest.txt\`. Each run also archived by timestamp+sha."
            echo ""
            echo "Read from any device with git+SSH:"
            echo '```'
            echo "git fetch origin bench-results && git show origin/bench-results:results/latest.txt"
            echo '```'
          } > "$tmp/README.md"

          git -C "$tmp" add -A
          if git -C "$tmp" diff --cached --quiet; then
            echo "No result changes to commit."
          else
            git -C "$tmp" commit -m "bench results ${stamp} (${sha}) [skip ci]"
            git -C "$tmp" push origin bench-results
            echo "Pushed results to bench-results:$outfile"
          fi
          git worktree remove --force "$tmp" || true
